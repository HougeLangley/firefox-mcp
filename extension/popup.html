<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    .status {
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .status.connected {
      background: #d4edda;
      color: #155724;
    }
    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }
    button:hover {
      background: #f0f0f0;
    }
    .info {
      font-size: 12px;
      color: #666;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>🔥 OpenClaw Firefox MCP</h1>
  
  <div id="status" class="status disconnected">
    Checking connection...
  </div>
  
  <button id="reconnectBtn">Reconnect</button>
  
  <div class="info">
    <p>Host: <code>openclaw.firefox.mcp</code></p>
    <p>Version: 1.0.5</p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
